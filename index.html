<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you love me?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  body {
    margin: 0;
    padding: 0;
    height: 100vh;
    background: #ffc0cb; /* خلفية بينك */
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', cursive; /* خط Craft تقريبًا */
    overflow: hidden;
  }

  .container {
    text-align: center;
    z-index: 2;
  }

  h1 {
    color: white;
    margin-bottom: 40px;
    font-size: 18px;
  }

  .btn {
    padding: 15px 25px;
    margin: 10px;
    font-size: 12px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    transition: all 0.3s ease;
  }

  .yes {
    background-color: #ffffffaa;
    color: #ff69b4;
  }

  .yes:hover {
    background-color: #fff;
    transform: scale(1.1);
  }

  .no {
    background-color: #ffffff55;
    color: #ff1493;
    pointer-events: none; /* ما ينضغط */
  }

  /* الثلج/الورد الخفيف */
  .snowflake {
    position: absolute;
    top: -10px;
    font-size: 10px;
    color: white;
    user-select: none;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  #result img {
    max-width: 300px;
    margin-top: 20px;
  }

  #result p {
    color: white;
    margin-top: 15px;
    font-size: 12px;
  }

</style>
</head>
<body>

<div class="container">
  <h1>Do you love me?</h1>
  <button class="btn yes" onclick="showResult()">Yes</button>
  <button class="btn no">No</button>

  <div id="result"></div>
</div>

<!-- الثلوج/الورود -->
<script>
  function createSnowflake() {
    const snowflake = document.createElement('div');
    snowflake.classList.add('snowflake');
    snowflake.textContent = '❀'; // وردة صغيرة
    snowflake.style.left = Math.random() * 100 + 'vw';
    snowflake.style.animationDuration = (5 + Math.random() * 5) + 's';
    snowflake.style.fontSize = (10 + Math.random() * 20) + 'px';
    document.body.appendChild(snowflake);
    setTimeout(() => snowflake.remove(), 10000);
  }

  setInterval(createSnowflake, 300);

  function showResult() {
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = `
      <img src="https://i.pinimg.com/originals/23/64/39/23643966789960667.jpg" alt="Image">
      <p>I knew it, you are literally obsessed with me</p>
    `;
  }
</script>

</body>
</html>
